<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Johann & Nuria</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#f8f8f8;
font-family:'Inter',sans-serif;
}

.container{
background:white;
padding:50px;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
width:420px;
max-width:90%;
text-align:center;
border:1px solid rgba(198,168,107,0.2);
}

h1{
font-family:'Playfair Display',serif;
color:#c6a86b;
margin-bottom:5px;
}

.date{
color:#999;
margin-bottom:30px;
}

input{
width:85%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
outline:none;
}

input:focus{
border-color:#c6a86b;
box-shadow:0 0 8px rgba(198,168,107,0.2);
}

.suggestions{
margin-top:10px;
text-align:left;
max-width:300px;
margin-left:auto;
margin-right:auto;
}

.suggestions div{
padding:8px;
cursor:pointer;
}

.suggestions div:hover{
background:#f3f3f3;
}

.card{
margin-top:30px;
padding:25px;
border-radius:15px;
background:#ffffff;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
opacity:0;
transform:translateY(20px);
transition:all 0.6s ease;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.gold{
color:#c6a86b;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:15px;
text-align:left;
}

.name{
padding:6px 0;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="container">

<h1>Johann & Nuria</h1>
<div class="date">3 avril 2026</div>

<input id="search" placeholder="Entrez votre nom">

<div id="suggestions" class="suggestions"></div>

const input = document.getElementById("search");
const suggestions = document.getElementById("suggestions");
const card = document.getElementById("card");

let allGuests = Object.values(tables).flat();

input.addEventListener("input", () => {

let value = input.value.toLowerCase();

suggestions.innerHTML = "";

if(!value) return;

let matches = allGuests.filter(n => n.toLowerCase().includes(value)).slice(0,5);

matches.forEach(name => {

let div = document.createElement("div");
div.textContent = name;

div.onclick = () => showResult(name);

suggestions.appendChild(div);

});

});

function showResult(name){

input.value = name;
suggestions.innerHTML = "";

for (let table in tables){

if(tables[table].includes(name)){

let others = tables[table].filter(n => n !== name);

card.classList.remove("show");

setTimeout(()=>{

card.innerHTML = `
✨ Bienvenue <b>${name}</b><br><br>
🍽️ Table <span class="gold">${table}</span>

<div class="grid">
${others.map(n=>`<div class="name">${n}</div>`).join("")}
</div>
`;

card.classList.add("show");

},100);

}

}

}

</script>

</body>
</html>
