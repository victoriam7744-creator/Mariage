<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johann & Nuria</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Manrope:wght@300;400&display=swap" rel="stylesheet">

<style>

/* 🌿 BACKGROUND */

body{
margin:0;
font-family:'Manrope', sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
min-height:100svh;
padding:20px;

color:#3A3A3A;

background:
linear-gradient(135deg, #f8f3ec 0%, #efe6d8 50%, #e8dccb 100%);
}

/* 🎬 INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f5efe6;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:1.2s ease;
}

.intro-content{
text-align:center;
opacity:0;
transform:translateY(20px);
animation:introFade 1.8s ease forwards;
}

.intro-content h2{
font-family:'Playfair Display',serif;
color:#C8A96A;
font-size:38px;
margin-bottom:10px;
}

.intro-content p{
color:#7a7a7a;
margin-bottom:35px;
}

.enter-btn{
padding:14px 28px;
border-radius:50px;
border:1px solid #C8A96A;
background:transparent;
color:#C8A96A;
cursor:pointer;
}

.enter-btn:hover{
background:#C8A96A;
color:white;
}

@keyframes introFade{
to{opacity:1; transform:translateY(0);}
}

#intro.hide{
opacity:0;
pointer-events:none;
}

/* 💎 CONTAINER */

.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
border-radius:24px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
padding:24px;
}

/* 📸 PHOTO */

.photo-container{
position:relative;
height:230px;
border-radius:18px;
overflow:hidden;
margin-bottom:20px;
}

.photo{
width:100%;
height:100%;
object-fit:cover;
object-position:65% 30%;
filter:brightness(1.05);
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.2));
}

/* ✨ TITRE */

h1{
font-family:'Playfair Display',serif;
color:#C8A96A;
text-align:center;
margin:10px 0;
font-size:30px;
}

.date,.message{
text-align:center;
color:#6e6e6e;
margin-bottom:15px;
}

/* 🔎 INPUT */

input{
width:85%;
margin:auto;
display:block;
padding:14px;
border-radius:14px;
border:1px solid #e0d6c8;
background:#f7f3ed;
color:#3A3A3A;
font-size:16px;
}

input::placeholder{
color:#999;
}

/* 💡 SUGGESTIONS */

.suggestions{
margin-top:12px;
background:#ffffff;
border-radius:14px;
opacity:0;
transform:translateY(10px);
transition:0.3s;
}

.suggestions.show{
opacity:1;
transform:translateY(0);
}

.suggestions div{
padding:14px;
cursor:pointer;
}

.suggestions div:hover{
background:#f5efe6;
}

/* 💎 CARD */

.card{
margin-top:25px;
padding:22px;
border-radius:18px;
background:#fffdf9;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
opacity:0;
transform:translateY(20px);
transition:0.4s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.gold{
color:#C8A96A;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.name{
border-bottom:1px solid #eee;
}

/* 🔘 BOUTON */

.reset{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:#C8A96A;
color:white;
display:none;
}

/* 📍 PLAN */

#planContainer{
display:none;
margin-top:20px;
text-align:center;
position:relative;
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div id="intro">
  <div class="intro-content">
    <h2>Johann & Nuria</h2>
    <p>3 avril 2026</p>
    <button id="enterBtn" class="enter-btn">Entrer</button>
  </div>
</div>

<div class="container">

<div class="photo-container">
<img src="photo.jpg" class="photo">
<div class="overlay"></div>
</div>

<h1>Johann & Nuria</h1>
<div class="date">3 avril 2026</div>

<input id="search" placeholder="Entrez votre prénom">

<div id="suggestions" class="suggestions"></div>

<div id="welcomeMessage" class="message">Nous sommes ravis de vous accueillir</div>

<div id="card" class="card"></div>

<div id="planContainer">
<p style="color:#C8A96A;">📍 Trouvez votre table</p>

<div id="planWrapper" style="position:relative;">
<img src="plan.png" style="width:100%; border-radius:12px;">
</div>

</div>

<button id="reset" class="reset">Nouvelle recherche</button>

</div>

<script>

document.getElementById("enterBtn").onclick = () => {
document.getElementById("intro").classList.add("hide");
};

const tables = {
"1":["Jacques","Achea","Arnaud","Viviane","Keshawn","Naomie","Joy","Mireille","Tonton Faustin","Martin"],
"2":["Maman Johann","Pierre","Stella","Peddy","Papa Johann","Axel","Assena","Limania","Massita","Alfred Koudou"],
"3":["Kaelan","Ahcene","Ana Cruz","Anildo","Isaac Fernandes Ramos","Chloe Fernandes Ramos","Tito","Maman Nuria","Ivy"],
"4":["Catia","Keano","Kayla","Nancy Soares Gomes","Vania","Lea","Yara","Cintia","Vitória","Cristina"],
"5":["Tata Julienne","Tata Chantal","Tonton Alain","Marie Agathe","Marie Pascale","Kylian","Stephane","Keny","Enny","Tonton Toussaint"],
"6":["Tonton Thierry","Tata Raissa","Josué Everdy","Grace","Jean-Baptiste","Mamso","Krisdyl","Kricen","Tata Florence","Tonton Christian"],
"7":["Mama Filipa","Papa Nuria","Nidia","Gerson","Thaïs","Anais","Adriano","Marcio","Ivan","Tia Susana","Felisberto"],
"8":["Nicole","Lisandra","Thelma","Lenira","Lukas","Enzo Monteiro","Davi","Zoe","Zara","Thierry"],
"9":["Jonathan","Naomie Mupala","Ronald Mupala","Silvio","Aby","Noemie Legendre","Tycia","Sarah Kibongui","Romuald","Anderson","Eldy"],
"10":["Mr Mamet","Stephane Ganessin","Priya Ganessin","Jules","Johan","Mme Mamet","Yofa","Fatou","Lois","Elise"],
"11":["Gabrielle","Noah de Bourqueney","Maelys","Mounia","Momo","Eden","Severine"],
"12":["Filipe","Rayan","Tio Jota","Tonton Geraldo","Marie Monteiro","Patrick","Tia Tanha","Tio Alex","Tia Carla","Tia Djena","Assia"],
"13":["Diaconesse Rosette","Diacre Larden","Shanice","Pasteur Deodat","Pasteure Lauriane","Pasteure Laure","Eline","Eliakim","Diacre Jacky","Diaconesse Mauly","Rose"],
"14":["Deborah","Christal","Kevin","Gaspard","Natacha","Jugrace","Roberta","Edwyn","Odelie"],
"15":["Isaiah Da Veiga","Cassandra","Servante Elise","Pasteur Jean Daniel","Usher","Ashley","Isaiah Koné","Victoria","Alexis","Gaelle","Elijah"],
"16":["David","Tony","Clément","Keellion","Leonel","Curtis","Mohamed Aziz","Nico","Kendy","Daniel","Jayce"],

"21":["Andrea","Dylan","Edison","Emmanuel Tokobe","Florian","Jean Jerry","Jeff","Leny","Milhane","Yannis Gatariki","Ulrich"],
"22":["Helea","Samantha","Kyslie","Maria Kikevel","Sarah Kikevel","Marie Munganga","Aurelie","Susana","Stacy","Sephora"],

};

const input = document.getElementById("search");
const suggestions = document.getElementById("suggestions");
const card = document.getElementById("card");
const reset = document.getElementById("reset");

let allGuests = Object.values(tables).flat();

input.addEventListener("input", () => {

let value = input.value.toLowerCase();

suggestions.innerHTML="";
suggestions.classList.remove("show");
card.classList.remove("show");
card.innerHTML="";
reset.style.display="none";

if(!value) return;

let matches = allGuests
.filter(name => name.toLowerCase().includes(value))
.slice(0,5);

matches.forEach(name=>{
let div=document.createElement("div");
div.textContent=name;
div.onclick=()=>showResult(name);
suggestions.appendChild(div);
});

if(matches.length){
suggestions.classList.add("show");
}

});

function showResult(name){

input.value=name;

document.getElementById("search").style.display = "none";
document.getElementById("welcomeMessage").style.display = "none";

suggestions.innerHTML="";
suggestions.classList.remove("show");

for(let table in tables){

if(tables[table].includes(name)){

let others=tables[table].filter(n=>n!==name);

card.innerHTML=`
💌 Ravi de vous accueillir <span class="gold">${name}</span><br><br>
🍽️ Table <span class="gold">${table}</span>

<div class="grid">
${others.map(n=>`<div class="name">${n}</div>`).join("")}
</div>
`;

card.classList.add("show");
reset.style.display="block";

document.getElementById("planContainer").style.display="block";

}

}

}

reset.onclick=()=>{
input.value="";
card.innerHTML="";
card.classList.remove("show");
suggestions.innerHTML="";
suggestions.classList.remove("show");
reset.style.display="none";

document.getElementById("planContainer").style.display="none";

document.getElementById("search").style.display = "block";
document.getElementById("welcomeMessage").style.display = "block";
};

</script>

</body>
</html>
