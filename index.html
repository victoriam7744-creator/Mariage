<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johann & Nuria</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Manrope:wght@300;400&display=swap" rel="stylesheet">

<style>

/* 🌙 BACKGROUND */

body{
margin:0;
font-family:'Manrope', sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
min-height:100svh;
padding:20px;
color:#F2F2F2;

background:
radial-gradient(circle at 20% 20%, rgba(139,30,45,0.15), transparent 60%),
radial-gradient(circle at 80% 80%, rgba(200,169,106,0.08), transparent 60%),
#121212;
}

/* 🎬 INTRO */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0d0d0d;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:1.2s ease;
}

.intro-content{
text-align:center;
opacity:0;
transform:translateY(20px) scale(1.05);
animation:introFade 1.8s ease forwards;
}

.intro-content h2{
font-family:'Playfair Display',serif;
color:#C8A96A;
font-size:38px;
margin-bottom:10px;
}

.intro-content p{
color:#ccc;
margin-bottom:35px;
}

.enter-btn{
padding:14px 28px;
border-radius:50px;
border:1px solid #C8A96A;
background:transparent;
color:#C8A96A;
cursor:pointer;
}

.enter-btn:hover{
background:#C8A96A;
color:#121212;
}

@keyframes introFade{
to{opacity:1; transform:translateY(0);}
}

#intro.hide{
opacity:0;
pointer-events:none;
}

/* 💎 CONTAINER */

.container{
width:100%;
max-width:420px;
background:rgba(30,30,30,0.75);
backdrop-filter:blur(12px);
border-radius:24px;
box-shadow:0 30px 80px rgba(0,0,0,0.7);
padding:24px;
}

/* 📸 PHOTO */

.photo-container{
position:relative;
height:230px;
border-radius:18px;
overflow:hidden;
margin-bottom:20px;
}

.photo{
width:100%;
height:100%;
object-fit:cover;
object-position:65% 30%;
filter:brightness(0.85) contrast(1.05);
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.6));
}

/* ✨ TITRE */

h1{
font-family:'Playfair Display',serif;
color:#C8A96A;
text-align:center;
margin:10px 0 5px;
font-size:30px;
}

.date,.message{
text-align:center;
color:#BFBFBF;
margin-bottom:15px;
}

/* 🔎 INPUT */

input{
width:85%;
margin:auto;
display:block;
padding:14px;
border-radius:14px;
border:1px solid #333;
background:#1A1A1A;
color:#F2F2F2;
font-size:16px; /* 👈 AJOUT */
}
input::placeholder{
color:#777;
font-size:15px;
}
/* 💡 SUGGESTIONS */

.suggestions{
margin-top:12px;
background:#1E1E1E;
border-radius:14px;
opacity:0;
transform:translateY(10px);
transition:0.3s;
}

.suggestions.show{
opacity:1;
transform:translateY(0);
}

.suggestions div{
padding:14px;
cursor:pointer;
}

.suggestions div:hover{
background:#2A2A2A;
}

/* 💎 CARD */

.card{
margin-top:25px;
padding:22px;
border-radius:18px;
background:#1A1A1A;
opacity:0;
transform:translateY(20px);
transition:0.4s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.gold{
color:#C8A96A;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.name{
border-bottom:1px solid #333;
}

/* 🔘 BOUTON */

.reset{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:#C8A96A;
color:#121212;
display:none;
}

</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div class="intro-content">
    <h2>Johann & Nuria</h2>
    <p>3 avril 2026</p>
    <button id="enterBtn" class="enter-btn">Entrer</button>
  </div>
</div>

<audio id="music" preload="auto">
  <source src="musique.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="photo-container">
<img src="photo.jpg" class="photo">
<div class="overlay"></div>
</div>

<h1>Johann & Nuria</h1>
<div class="date">3 avril 2026</div>

<input id="search" placeholder="Entrez votre prénom">

<div id="suggestions" class="suggestions"></div>

<div id="welcomeMessage" class="message">Nous sommes ravis de vous accueillir</div>

<div id="card" class="card"></div>

<button id="reset" class="reset">Nouvelle recherche</button>

</div>

<script>

/* 🎧 AUDIO DOUX */

function fadeInAudio(audio){
audio.volume = 0;
audio.play();

let fade = setInterval(()=>{
if(audio.volume < 0.6){
audio.volume += 0.02;
}else{
clearInterval(fade);
}
},150);
}

const music = document.getElementById("music");

music.addEventListener("timeupdate", () => {
if(music.currentTime > music.duration - 2){
let fadeOut = setInterval(()=>{
if(music.volume > 0.05){
music.volume -= 0.05;
}else{
clearInterval(fadeOut);
music.currentTime = 0;
fadeInAudio(music);
}
},100);
}
});

document.getElementById("enterBtn").onclick = () => {
fadeInAudio(music);
intro.classList.add("hide");
setTimeout(()=>{intro.style.display="none";},1200);
};

/* 📊 TES DONNÉES COMPLÈTES */

const tables = {

"1":["Kaelan","Ahcene","Ana","Anildo","Isaac","Chloe","Tito","Maman Nuria","Ivy"],
"2":["Mama Filipa","Papa Nuria","Nidia","Lisandra","Thelma","Nicole","Thierry","Tia Susana","Felisberto"],
"3":["Catia","Keano","Kayla","Nancy","Vania","Lea","Yara","Ricardo","Cintia","Cristina","Victoria"],
"4":["Lukas","Stefan","Davi","Enzo","Zoe","Zara"],
"5":["Gabrielle","Noah","Maelys","Mounia","Naim","Eden","Severine","Momo"],
"6":["Tia Tania","Tia Julia","Tio Jota","Tonton Geraldo","Marie","Patrick","Tia Tanha","Tio Alex","Tia Carla","Tia Djena"],
"7":["Gaelle","Usher","Ashley","Isaiah","Victoria","Alexis","Elijah"],
"8":["Thaïs","Rayan","Anais","Lenira","Ivan","Marcio","Assia","Filipe","Adriano","Gerson"],
"9":["Emma","Victoire","Agnès","Oceane","Noah","Ana","Anthony","Ode","Maxence"],
"10":["Evangeliste Gianny","Helena","Laura","Naomi","Noemi","Oceanne","Priscillia","Sheryne","Laeticia","Cynthia"],
"11":["Enzo","Isaac","Guillith","Jordan","Esther","Joelle","Asayah","Manassé","Jackson","Anicia"],
"12":["Christopher","Aya","Mohammed","Dj Chris","Deejay 13"],
"13":["Tonton Alain","Tata Chantal","Marie Agathe","Marie Pascal","Kylian","Tonton Thierry","Tata Raissa","Everdy","Grace","Stephane"],
"14":["Maman Johann","Pierre","Stella","Peddy","Papa Johann","Axel","Ahcena","Lili","Massita","Charles"],
"15":["Tata Julienne","Tata Florence","Krysdil","Krysen","Mamso","Tonton Alain","Jean-Baptiste","Kenny","Eni","Cassandra","Tonton Toussaint"],
"16":["Arnaud","Jack","Achoua","Priya","Jules","Johan","Siva","Fatou"],
"17":["Deborah","Christal","Kevin","Pasteur Jean Daniel","Servante Elise","Jugrace","Roberta","Servante Honorée","Edwyn","Odelie","Gaspard"],
"18":["Jonathan","Naomie","Ronald","Silvio","Aby","Noemie Legendre","Tycia","Sarah Kibongui","Romuald","Anderson","Eldy"],
"19":["William","Aaron","Wildan","Tiphanie","Sandra","Nancy","Junior","Emeraude","Gerielle","Grace Julia","Yannis"],
"20":["Diaconesse Rosette","Diacre Larden","Shanice","Pasteur Deodat Babingui","Pasteure Lauriane Babingui","Pasteure Laure","Eline","Eliakim","Diacre Jacky","Diaconesse Mauly","Rose"],
"21":["Helea","Samantha","Kyslie","Maria K","Sarah K","Marie","Nacera","Stacy","Sephora","Aurelie"],
"22":["David","Jayce","Tony","Keellion","Leonel","Curtis","Mohamed Aziz","Nico","Kendy","Daniel","Clément"],
"23":["Ines","Benoit","Tom","Fredo","Chloe","Alicia","Renée","Manoella","Jeanette"],
"24":["Andrea","Dylan","Edison","Emmanuel","Florian","Jean Jerry","Jeff","Leny","Milhane","Yannis","Ulrich"]

};

const input = document.getElementById("search");
const suggestions = document.getElementById("suggestions");
const card = document.getElementById("card");
const reset = document.getElementById("reset");

let allGuests = Object.values(tables).flat();

input.addEventListener("input", () => {

let value = input.value.toLowerCase();

suggestions.innerHTML="";
suggestions.classList.remove("show");
card.classList.remove("show");
card.innerHTML="";
reset.style.display="none";

if(!value) return;

let matches = allGuests
.filter(name => name.toLowerCase().includes(value))
.slice(0,5);

matches.forEach(name=>{
let div=document.createElement("div");
div.textContent=name;
div.onclick=()=>showResult(name);
suggestions.appendChild(div);
});

if(matches.length){
suggestions.classList.add("show");
}

});

function showResult(name){

input.value=name;
  
document.getElementById("search").style.display = "none";
document.getElementById("welcomeMessage").style.display = "none";
  
suggestions.innerHTML="";
suggestions.classList.remove("show");

for(let table in tables){

if(tables[table].includes(name)){

let others=tables[table].filter(n=>n!==name);

card.innerHTML=`
💌 Ravi de t'accueillir <span class="gold">${name}</span><br><br>
🍽️ Table <span class="gold">${table}</span>

<div class="grid">
${others.map(n=>`<div class="name">${n}</div>`).join("")}
</div>
`;

card.classList.add("show");
reset.style.display="block";

}

}

}

reset.onclick=()=>{
input.value="";
card.innerHTML="";
card.classList.remove("show");
suggestions.innerHTML="";
suggestions.classList.remove("show");
reset.style.display="none";
  
document.getElementById("search").style.display = "block";
document.getElementById("welcomeMessage").style.display = "block";
};

</script>

</body>
</html>
