<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Johann & Nuria</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Inter',sans-serif;
background:
linear-gradient(rgba(255,255,255,0.95), rgba(255,255,255,0.95)),
url("https://www.transparenttextures.com/patterns/paper-fibers.png");
}

.container{
background:white;
padding:50px;
border-radius:18px;
box-shadow:0 25px 70px rgba(0,0,0,0.08);
width:420px;
max-width:90%;
text-align:center;
border:1px solid rgba(198,168,107,0.2);
}

h1{
font-family:'Playfair Display',serif;
color:#c6a86b;
margin-bottom:5px;
}

.date{
color:#999;
margin-bottom:25px;
}

input{
width:85%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
outline:none;
}

input:focus{
border-color:#c6a86b;
box-shadow:0 0 8px rgba(198,168,107,0.15);
}

/* Suggestions luxe */

.suggestions{
margin-top:15px;
text-align:left;
max-width:300px;
margin-left:auto;
margin-right:auto;
background:white;
border-radius:14px;
box-shadow:0 12px 30px rgba(0,0,0,0.06);
overflow:hidden;
border:1px solid #f0f0f0;
opacity:0;
transform:translateY(10px);
transition:all 0.3s ease;
}

.suggestions.show{
opacity:1;
transform:translateY(0);
}

.suggestions div{
padding:14px 16px;
cursor:pointer;
font-size:15px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.25s;
}

.suggestions div:hover{
background:#fafafa;
}

.suggestions div span{
font-size:13px;
color:#c6a86b;
opacity:0;
transition:0.2s;
}

.suggestions div:hover span{
opacity:1;
}

/* Carte */

.card{
margin-top:30px;
padding:25px;
border-radius:16px;
background:#ffffff;
box-shadow:0 12px 35px rgba(0,0,0,0.06);
opacity:0;
transform:scale(0.95) translateY(10px);
filter:blur(6px);
transition:all 0.5s ease;
}

.card.show{
opacity:1;
transform:scale(1) translateY(0);
filter:blur(0);
}

.gold{
color:#c6a86b;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
text-align:left;
}

.name{
padding:6px 0;
border-bottom:1px solid #eee;
}

/* bouton */

.reset{
margin-top:20px;
padding:10px 18px;
border:none;
background:#c6a86b;
color:white;
border-radius:10px;
cursor:pointer;
display:none;
}

.reset:hover{
background:#b99750;
}

.message{
margin-top:20px;
color:#888;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Johann & Nuria</h1>
<div class="date">3 avril 2026</div>

<input id="search" placeholder="Entrez votre prénom">

<div id="suggestions" class="suggestions"></div>

<div class="message">Nous sommes ravis de vous accueillir</div>

<div id="card" class="card"></div>

<button id="reset" class="reset">Nouvelle recherche</button>

</div>

<script>

const tables = {

"1":["Kaelan","Ahcene","Ana","Anildo","Isaac","Chloe","Tito","Maman Nuria","Ivy"],
"2":["Mama Filipa","Papa Nuria","Nidia","Lisandra","Thelma","Nicole","Thierry","Tia Susana","Felisberto"],
"3":["Catia","Keano","Kayla","Nancy","Vania","Lea","Yara","Ricardo","Cintia","Cristina","Victoria"],
"4":["Lukas","Stefan","Davi","Enzo","Zoe","Zara"],
"5":["Gabrielle","Noah","Maelys","Mounia","Naim","Eden","Severine","Momo"],
"6":["Tia Tania","Tia Julia","Tio Jota","Tonton Geraldo","Marie","Patrick","Tia Tanha","Tio Alex","Tia Carla","Tia Djena"],
"7":["Gaelle","Usher","Ashley","Isaiah","Victoria","Alexis","Elijah"],
"8":["Thaïs","Rayan","Anais","Lenira","Ivan","Marcio","Assia","Filipe","Adriano","Gerson"],
"9":["Emma","Victoire","Agnès","Oceane","Noah","Ana","Anthony","Ode","Maxence"],
"10":["Evangeliste Gianny","Helena","Laura","Naomi","Noemi","Oceanne","Priscillia","Sheryne","Laeticia","Cynthia"],
"11":["Enzo","Isaac","Guillith","Jordan","Esther","Joelle","Asayah","Manassé","Jackson","Anicia"],
"12":["Christopher","Aya","Mohammed","Dj Chris","Deejay 13"],
"13":["Tonton Alain","Tata Chantal","Marie Agathe","Marie Pascal","Kylian","Tonton Thierry","Tata Raissa","Everdy","Grace","Stephane"],
"14":["Maman Johann","Pierre","Stella","Peddy","Papa Johann","Axel","Ahcena","Lili","Massita","Charles"],
"15":["Tata Julienne","Tata Florence","Krysdil","Krysen","Mamso","Tonton Alain","Jean-Baptiste","Kenny","Eni","Cassandra","Tonton Toussaint"],
"16":["Arnaud","Jack","Achoua","Priya","Jules","Johan","Siva","Fatou"],
"17":["Deborah","Christal","Kevin","Pasteur Jean Daniel","Servante Elise","Jugrace","Roberta","Servante Honorée","Edwyn","Odelie","Gaspard"],
"18":["Jonathan","Naomie","Ronald","Silvio","Aby","Noemie Legendre","Tycia","Sarah Kibongui","Romuald","Anderson","Eldy"],
"19":["William","Aaron","Wildan","Tiphanie","Sandra","Nancy","Junior","Emeraude","Gerielle","Grace Julia","Yannis"],
"20":["Diaconesse Rosette","Diacre Larden","Shanice","Pasteur Deodat Babingui","Pasteure Lauriane Babingui","Pasteure Laure","Eline","Eliakim","Diacre Jacky","Diaconesse Mauly","Rose"],
"21":["Helea","Samantha","Kyslie","Maria K","Sarah K","Marie","Nacera","Stacy","Sephora","Aurelie"],
"22":["David","Jayce","Tony","Keellion","Leonel","Curtis","Mohamed Aziz","Nico","Kendy","Daniel","Clément"],
"23":["Ines","Benoit","Tom","Fredo","Chloe","Alicia","Renée","Manoella","Jeanette"],
"24":["Andrea","Dylan","Edison","Emmanuel","Florian","Jean Jerry","Jeff","Leny","Milhane","Yannis","Ulrich"]

};

const input = document.getElementById("search");
const suggestions = document.getElementById("suggestions");
const card = document.getElementById("card");
const reset = document.getElementById("reset");

let allGuests = Object.values(tables).flat();

input.addEventListener("input", () => {

let value = input.value.toLowerCase();

suggestions.innerHTML="";
suggestions.classList.remove("show");
card.classList.remove("show");
card.innerHTML="";
reset.style.display="none";

if(!value) return;

let matches = allGuests
.filter(name => name.toLowerCase().includes(value))
.sort((a,b)=>{
let aStart = a.toLowerCase().startsWith(value);
let bStart = b.toLowerCase().startsWith(value);
if(aStart && !bStart) return -1;
if(!aStart && bStart) return 1;
return a.localeCompare(b);
})
.slice(0,5);

matches.forEach(name=>{

let tableNumber = Object.keys(tables).find(t => tables[t].includes(name));

let div=document.createElement("div");
div.innerHTML = `${name} <span>Table ${tableNumber}</span>`;
div.onclick=()=>showResult(name);

suggestions.appendChild(div);

});

if(matches.length){
suggestions.classList.add("show");
}

});

function showResult(name){

input.value=name;
suggestions.innerHTML="";
suggestions.classList.remove("show");

for(let table in tables){

if(tables[table].includes(name)){

let others=tables[table].filter(n=>n!==name);

setTimeout(()=>{

card.innerHTML=`
✨ Bienvenue <b>${name}</b><br><br>
🍽️ Table <span class="gold">${table}</span>

<div class="grid">
${others.map(n=>`<div class="name">${n}</div>`).join("")}
</div>
`;

card.classList.add("show");
reset.style.display="inline-block";

},100);

}

}

}

reset.onclick=()=>{
input.value="";
card.innerHTML="";
card.classList.remove("show");
suggestions.innerHTML="";
suggestions.classList.remove("show");
reset.style.display="none";
};

</script>

</body>
</html>
